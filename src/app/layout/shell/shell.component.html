<div class="shell">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <a class="brand" routerLink="/">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L22 8.5V15.5L12 22L2 15.5V8.5L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M12 2V22M2 8.5L22 15.5M22 8.5L2 15.5" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
      </svg>
      <span class="brand-text">Qabel <span class="ar-name">قابل</span></span>
    </a>

    <div class="topbar-divider"></div>

    <nav class="topnav">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          [class.nav-item--disabled]="item.disabled"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ lang.t(item.labelKey) }}</span>
          @if (item.disabled) {
            <span class="soon-badge">{{ lang.t('nav.soon') }}</span>
          }
        </a>
      }
    </nav>

    <span class="topbar-spacer"></span>

    <a class="nav-item" routerLink="/app/about" routerLinkActive="nav-item--active">
      <mat-icon class="nav-icon">person_outline</mat-icon>
      <span class="nav-label">{{ lang.t('nav.contact') }}</span>
    </a>

    <button class="lang-toggle" (click)="lang.toggle()" [matTooltip]="lang.lang() === 'en' ? 'Switch to Arabic' : 'Switch to English'">
      <span class="lang-badge">{{ lang.lang() === 'en' ? 'EN' : 'عر' }}</span>
      <span class="lang-label">{{ lang.lang() === 'en' ? 'العربية' : 'English' }}</span>
    </button>

    <button class="user-btn" [matMenuTriggerFor]="userMenu">
      <span class="user-avatar">{{ (auth.currentUser()?.name ?? 'U')[0].toUpperCase() }}</span>
      <span class="user-name">{{ auth.currentUser()?.name }}</span>
      <mat-icon class="chevron">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="user-menu-panel">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>{{ lang.t('nav.signOut') }}</span>
      </button>
    </mat-menu>
  </header>

  <!-- ── Content ── -->
  <main class="content">
    <router-outlet />
  </main>

  <!-- ── Footer ── -->
  <footer class="shell-footer">
    <span class="shell-footer__copy">{{ lang.t('nav.developedBy') }} Mohammad Alhathal</span>
    <div class="shell-footer__links">

          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/>
        </svg>
      </a>
